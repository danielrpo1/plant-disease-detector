<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Detector de enfermedades en plantas</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>Diagnóstico de hojas</h1>
    <p class="subtitle">Sube una foto y obtén el diagnóstico (EAFIT · <a href="https://github.com/danielrpo1/plant-disease-detector">código</a>)</p>
    <p id="apiHint" class="subtitle hidden"></p>

    <label class="upload">
      <input type="file" id="fileInput" accept="image/*" />
      <span>Elegir imagen</span>
    </label>

    <div id="preview" class="preview hidden"></div>
    <button id="btnPredict" class="btn" disabled>Analizar</button>

    <div id="loading" class="loading hidden">Analizando…</div>
    <div id="results" class="results hidden"></div>
    <p id="error" class="error hidden"></p>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.0/dist/ort.min.js"></script>
  <script src="config.js"></script>
  <script src="onnx-app.js"></script>
  <script src="app.js"></script>
</body>
</html>
